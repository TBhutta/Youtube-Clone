{% extends "base.html" %}
<!-- prettier-ignore -->
{% block title %}Sign in - YouTube Clone{% endblock %}
<!-- prettier-ignore -->
{% block styles %}
{% load static %}
<link
  rel="stylesheet"
  href="{% static 'authentication/login-page-styles.css' %}"
/>
<!-- prettier-ignore -->
{% endblock %}
<!-- prettier-ignore -->
{% block content %}
<section class="main-content">
  <h1 class="heading">Sign in</h1>

  <form action="#" method="post" class="login-form">
    {% csrf_token %} {{ form.as_p }}
      <div style="display: flex; justify-content: end">

        <button type="submit" class="login-btn">Login</button>
      </div>
  </form>
  <p>
    Don't have an account? Sign up <a href="/authentication/sign-up/">here</a>.
  </p>
</section>
{% endblock %}
